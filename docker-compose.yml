version: '3.8'

services:
  hems-pro:
    build: .
    container_name: hems-pro
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    # データベースの保存先を/app/data/energy.dbに変更する場合、
    # app.py内のsqlite3.connect("energy.db")を"data/energy.db"に書き換えてください。
